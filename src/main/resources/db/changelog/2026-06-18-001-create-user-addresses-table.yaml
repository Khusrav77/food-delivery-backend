databaseChangeLog:
  - changeSet:
      id: 2026-06-18-001-create-user-addresses-table
      author: shh
      changes:
        - createTable:
            tableName: user_addresses
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: title
                  type: VARCHAR(50)

              - column:
                  name: city
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: street
                  type: VARCHAR(150)
                  constraints:
                    nullable: false

              - column:
                  name: house
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: apartment
                  type: VARCHAR(20)

              - column:
                  name: entrance
                  type: VARCHAR(20)

              - column:
                  name: floor
                  type: VARCHAR(10)

              - column:
                  name: intercom
                  type: VARCHAR(20)

              - column:
                  name: comment
                  type: VARCHAR(255)

              - column:
                  name: latitude
                  type: DECIMAL(9,6)

              - column:
                  name: longitude
                  type: DECIMAL(9,6)

              - column:
                  name: is_default
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: user_addresses
            baseColumnNames: user_id
            constraintName: fk_user_addresses_user_id
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE

        - createIndex:
            tableName: user_addresses
            indexName: idx_user_addresses_user_id
            columns:
              - column:
                  name: user_id